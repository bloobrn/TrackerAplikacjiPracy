<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Aplikacji o Pracę</title>
<style>
    :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --background: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --border: #e2e8f0;
        
        /* Statusy - nowoczesne, stonowane kolory */
        --status-wyslano: #3b82f6;
        --status-odpowiedz: #a855f7;
        --status-rozmowa: #f59e0b;
        --status-odrzucenie: #ef4444;
        --status-oferta: #10b981;
    }

    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        max-width: 1000px; 
        margin: 0 auto; 
        padding: 40px 20px; 
        background: var(--background); 
        color: var(--text-main);
        line-height: 1.5;
    }

    h1 { 
        font-size: 1.8rem; 
        font-weight: 700; 
        color: var(--text-main); 
        margin-bottom: 24px;
        letter-spacing: -0.02em;
    }

    form { 
        background: var(--card-bg); 
        padding: 28px; 
        border-radius: 12px; 
        margin-bottom: 32px; 
        border: 1px solid var(--border);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); 
    }

    /* Układ pól w formularzu */
    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        margin-bottom: 20px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group.full-width {
        grid-column: 1 / -1;
    }

    label { 
        font-size: 0.85rem; 
        font-weight: 600; 
        color: var(--text-muted); 
        margin-bottom: 6px; 
    }

    input, select, textarea { 
        width: 100%; 
        padding: 10px 14px; 
        box-sizing: border-box; 
        border: 1px solid var(--border); 
        border-radius: 8px; 
        background: #fff;
        font-family: inherit;
        font-size: 0.95rem;
        color: var(--text-main);
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus, textarea:focus { 
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    textarea { resize: vertical; }

    button[type="submit"] { 
        background: var(--primary); 
        color: white; 
        border: none; 
        padding: 12px 24px; 
        border-radius: 8px; 
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer; 
        transition: background 0.2s;
    }

    button[type="submit"]:hover { 
        background: var(--primary-hover); 
    }

    .table-container {
        background: var(--card-bg);
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        overflow: hidden;
    }

    table { 
        width: 100%; 
        border-collapse: collapse; 
        text-align: left;
        font-size: 0.95rem;
    }

    th, td { padding: 14px 20px; border-bottom: 1px solid var(--border); }

    th { 
        background: #f8fafc; 
        color: var(--text-muted); 
        font-weight: 600; 
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fdfdfd; }

    /* Nowoczesne odznaki statusów */
    .status { 
        display: inline-block;
        padding: 4px 10px; 
        border-radius: 6px; 
        font-size: 0.8rem; 
        font-weight: 600; 
        color: white; 
    }
    .status-wysłano { background: var(--status-wyslano); }
    .status-odpowiedź { background: var(--status-odpowiedz); }
    .status-rozmowa { background: var(--status-rozmowa); }
    .status-odrzucenie { background: var(--status-odrzucenie); }
    .status-oferta { background: var(--status-oferta); }
    select.status-select {
         display: inline-block;
   	 padding: 4px 10px;
   	 border-radius: 6px;
   	 font-size: 0.8rem;
   	 font-weight: 600;
   	 color: white;
   	 border: none;
   	 cursor: pointer;
   	 -webkit-appearance: none;
   	 appearance: none;
   	 text-align: center;
   	 font-family: inherit;
}
    select.status-select:focus {
   	 outline: none;
   	 box-shadow: 0 0 0 2px rgba(0,0,0,0.15);
}    

    .delete-btn { 
        background: #fff; 
        color: #ef4444;
        border: 1px solid #fee2e2;
        padding: 6px 12px; 
        font-size: 0.85rem; 
        font-weight: 500;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .delete-btn:hover { 
        background: #ef4444; 
        color: white;
        border-color: #ef4444;
    }
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15, 23, 42, 0.5);
    align-items: center;
    justify-content: center;
    z-index: 1000;
}
.modal-overlay.active {
    display: flex;
}
.modal-box {
    background: white;
    border-radius: 12px;
    padding: 28px;
    max-width: 500px;
    width: 90%;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
.modal-box h2 {
    margin-top: 0;
    font-size: 1.3rem;
    color: var(--text-main);
}
.modal-field {
    margin-bottom: 14px;
}
.modal-field label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 4px;
}
.modal-field .value {
    font-size: 0.95rem;
    color: var(--text-main);
    white-space: pre-wrap;
}
.modal-field .value a {
    color: var(--primary);
    word-break: break-all;
}
.modal-close-btn {
    margin-top: 10px;
    background: var(--primary);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
}
.details-btn {
    background: #fff;
    color: var(--primary);
    border: 1px solid #e0e7ff;
    padding: 6px 12px;
    font-size: 0.85rem;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    margin-right: 6px;
}
.details-btn:hover {
    background: var(--primary);
    color: white;
}
</style>
</head>
<body>

<h1>Tracker Aplikacji o Pracę</h1>

<form id="applicationForm">
    <div class="form-grid">
        <div class="form-group">
            <label>Firma *</label>
            <input type="text" id="company" required>
        </div>

        <div class="form-group">
            <label>Stanowisko</label>
            <input type="text" id="position">
        </div>

        <div class="form-group">
            <label>Typ aplikacji</label>
            <select id="applicationType">
                <option value="intern">staż (intern)</option>
                <option value="job">praca (job)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select id="status">
                <option value="wysłano">wysłano</option>
                <option value="odpowiedź">odpowiedź</option>
                <option value="rozmowa">rozmowa</option>
                <option value="odrzucenie">odrzucenie</option>
                <option value="oferta">oferta</option>
            </select>
        </div>

        <div class="form-group full-width">
            <label>Notatki</label>
            <textarea id="notes" rows="2"></textarea>
        </div>

        <div class="form-group full-width">
            <label>Link do oferty</label>
            <input type="text" id="offerLink">
        </div>
    </div>

    <button type="submit">Dodaj aplikację</button>
</form>

<div class="table-container">
    <table id="applicationsTable">
        <thead>
            <tr>
                <th>Firma</th>
                <th>Stanowisko</th>
                <th>Typ</th>
                <th>Status</th>
                <th>Data</th>
		<th>Szczegóły</th>
                <th>Akcje</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="modal-overlay" id="detailsModal">
    <div class="modal-box">
        <h2 id="modalCompany"></h2>
        <div class="modal-field">
            <label>Stanowisko</label>
            <div class="value" id="modalPosition"></div>
        </div>
        <div class="modal-field">
            <label>Notatki</label>
            <div class="value" id="modalNotes"></div>
        </div>
        <div class="modal-field">
            <label>Link do oferty</label>
            <div class="value" id="modalOfferLink"></div>
        </div>
        <button class="modal-close-btn" onclick="closeModal()">Zamknij</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
